<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>404 - Page Not Found</title>
		<style>
			body { margin: 0; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
			.container { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; padding: 1.5rem; }
			.logo { height: 4rem; width: auto; margin-bottom: 0.5rem; }
			h1 { font-size: 3.75rem; font-weight: 700; color: #5f259f; margin: 0; }
			p { font-size: 1.125rem; color: #1e1e1e; margin: 0; }
			.btn { background-color: #5f259f; color: white; padding: 0.75rem 2rem; border-radius: 9999px; text-decoration: none; font-size: 0.8125rem; font-weight: 600; transition: background-color 0.2s; }
			.btn:hover { background-color: #7b3ebf; }
		</style>
	</head>
	<body>
		<div class="container">
			<!-- Note: In a real build, ensure the logo path is correct relative to the root -->
			<img src="/assets/logo/masche-primary-vertical.svg" alt="Masche Academics" class="logo" />
			<h1>404</h1>
			<p>Oops! The page you're looking for doesn't exist.</p>
			<a href="/" class="btn">Back to Home</a>
		</div>
	</body>
</html>
